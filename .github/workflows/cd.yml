# Workflow name displayed in GitHub Actions
name: CD

# Trigger conditions for this workflow
on:
  # Run on push to main branch only
  push:
    branches: [ main ]

# Define jobs to run
jobs:
  # Job name
  deploy:
    # Use Ubuntu latest runner
    runs-on: ubuntu-latest
    
    # Steps to execute in this job
    steps:
    # Checkout repository code
    - uses: actions/checkout@v4
    
    # Install .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        # Specify .NET version
        dotnet-version: '8.0.x'
    
    # Restore NuGet packages for main project only
    - name: Restore dependencies
      run: dotnet restore BlazorAppFirstWithMacDemo.csproj
    
    # Build the project in Release mode
    - name: Build
      run: dotnet build BlazorAppFirstWithMacDemo.csproj --configuration Release
    
    # Publish application to ./publish folder
    - name: Publish
      run: dotnet publish BlazorAppFirstWithMacDemo.csproj --configuration Release --output ./publish
    
    # Placeholder for deployment step
    - name: Deploy
      run: echo "Add your deployment steps here (Azure, AWS, etc.)"
